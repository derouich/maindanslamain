version: '3.9'

services:
  maindanslamain:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "85:85"
    container_name: maindanslamain_container
    environment:
      - PORT=85
    volumes:
      - .:/app
      - /app/node_modules
    restart: on-failure
    command: ["npm", "start"]
